name: Patch Minecraft APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: "Direct download URL of the original Minecraft APK"
        required: true
        type: string
      mbl_version:
        description: "MaterialBinLoader release tag (blank = latest)"
        required: false
        default: ""
        type: string
      release_tag:
        description: "Release tag (e.g. 1.21.51-mbl)"
        required: true
        default: "patched"
        type: string

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install tools
        run: |
          # apktool
          curl -sL https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -o apktool.jar
          curl -sL https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -o apktool
          chmod +x apktool
          # uber-apk-signer
          curl -sL https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar \
               -o uber-signer.jar
          # Pillow for icon injection
          pip install --quiet Pillow

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Resolve MaterialBinLoader .so
        run: |
          TAG="${{ github.event.inputs.mbl_version }}"
          if [ -z "$TAG" ]; then
            TAG=$(curl -s https://api.github.com/repos/ddf8196/MaterialBinLoader/releases/latest \
                  | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          fi
          echo "MBL Tag: $TAG"
          curl -sL \
            "https://github.com/ddf8196/MaterialBinLoader/releases/download/${TAG}/libmaterialbinloader-arm64-v8a.so" \
            -o libmaterialbinloader.so
          echo "MBL_TAG=$TAG" >> $GITHUB_ENV

      - name: Download Minecraft APK
        run: |
          curl -L "${{ github.event.inputs.apk_url }}" -o minecraft_original.apk
          echo "APK size: $(du -sh minecraft_original.apk | cut -f1)"

      # --no-res: decode smali + manifest only (fast, no resource recompile risk)
      - name: Decompile APK
        run: java -jar apktool.jar d minecraft_original.apk -o mc_decompiled --no-res -f

      - name: Inject native library
        run: |
          mkdir -p mc_decompiled/lib/arm64-v8a
          cp libmaterialbinloader.so mc_decompiled/lib/arm64-v8a/libmaterialbinloader.so

      - name: Patch manifest (app name & package)
        run: |
          # App display name
          sed -i 's/android:label="[^"]*"/android:label="Minecraft(Patched)"/' \
            mc_decompiled/AndroidManifest.xml
          # Package rename so it installs alongside original
          sed -i 's/package="com\.mojang\.minecraftpe"/package="com.mojang.minecraftpe.patch"/' \
            mc_decompiled/AndroidManifest.xml
          echo "Manifest patched:"
          grep -E 'package=|android:label' mc_decompiled/AndroidManifest.xml | head -5

      - name: Patch smali (library load + watermark)
        run: python3 scripts/smali_inject.py mc_decompiled

      - name: Repackage APK
        run: java -jar apktool.jar b mc_decompiled -o minecraft_unsigned.apk

      # Inject icons into the built APK zip — no resource decompile needed
      - name: Inject custom icon
        run: python3 scripts/inject_icons_apk.py minecraft_unsigned.apk assets/icon.png

      - name: Sign APK
        run: |
          java -jar uber-signer.jar \
            --apks minecraft_unsigned.apk \
            --out . \
            --ks debug.keystore \
            --ksAlias androiddebugkey \
            --ksPass android \
            --ksKeyPass android
          # uber-signer appends -aligned-signed
          mv minecraft_unsigned-aligned-signed.apk minecraft_patched.apk
          echo "Final APK: $(du -sh minecraft_patched.apk | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "Minecraft Patched — ${{ github.event.inputs.release_tag }} (MBL ${{ env.MBL_TAG }})"
          body: |
            ## Minecraft Patched APK
            - **MBL Version:** ${{ env.MBL_TAG }}
            - **Architecture:** arm64-v8a (64-bit only)
            - **Package:** com.mojang.minecraftpe.patch (installs alongside original)
            - **Includes:** MaterialBinLoader shader support
            - **Watermark:** "Powered By MaterialBin Tool" (bottom, black bg 80% opacity)

            > ⚠️ Sideload only. Enable "Install from unknown sources" in Android settings.
          files: minecraft_patched.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
